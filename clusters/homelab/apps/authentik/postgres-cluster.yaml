apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-postgres
spec:
  instances: 2
  storage:
    size: 5Gi
    storageClass: longhorn-strict-local
  bootstrap:
    initdb:
      database: authentik
      owner: authentik
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
