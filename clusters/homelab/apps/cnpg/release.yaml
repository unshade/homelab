---
# Operator only — deliberately no `Cluster` resource here yet. Deferred until
# Vaultwarden/Immich actually need it. When creating it: use the
# longhorn-strict-local StorageClass, and note Immich specifically needs a
# Postgres image with the pgvector extension, not stock. Backup (Barman +
# object storage) also deferred — CNPG supports it, just not configured yet.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.29.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
