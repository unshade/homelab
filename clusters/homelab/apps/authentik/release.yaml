---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: 2026.5.5
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Bundled bitnami postgresql subchart disabled — using CNPG (authentik-postgres) instead.
    postgresql:
      enabled: false
    authentik:
      bootstrap_email: noesteiner@proton.me
      error_reporting:
        enabled: false
      postgresql:
        host: authentik-postgres-rw
        name: authentik
        user: authentik
    server:
      replicas: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      route:
        main:
          enabled: true
          parentRefs:
            - name: main
              namespace: envoy-gateway-system
              sectionName: https
          hostnames:
            - auth.nstnr.com
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
  valuesFrom:
    - kind: Secret
      name: authentik-secrets
      valuesKey: secret-key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secrets
      valuesKey: bootstrap-password
      targetPath: authentik.bootstrap_password
    - kind: Secret
      name: authentik-secrets
      valuesKey: bootstrap-token
      targetPath: authentik.bootstrap_token
    - kind: Secret
      name: authentik-postgres-app
      valuesKey: password
      targetPath: authentik.postgresql.password
