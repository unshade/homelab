apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: private-bin
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/homelab/apps/private-bin
  prune: true
  wait: false
  dependsOn:
    - name: gateway-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
