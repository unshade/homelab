---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1h
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    persistence:
      # The chart's auto-created default StorageClass only supports
      # dataLocality: disabled|best-effort, not strict-local — so it's
      # disabled here in favor of the hand-written StorageClass below.
      defaultClass: false
    defaultSettings:
      # Subdirectory on the /var/mnt/data SSD (not the mount root), leaving
      # room for other uses of that disk later.
      defaultDataPath: /var/mnt/data/longhorn
