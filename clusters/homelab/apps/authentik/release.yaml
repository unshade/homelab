---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: 2026.5.5
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Bundled bitnami postgresql subchart disabled — using CNPG (authentik-postgres) instead.
    postgresql:
      enabled: false
    authentik:
      bootstrap_email: noesteiner@proton.me
      error_reporting:
        enabled: false
      # Parent domain, not auth.nstnr.com — the forward-auth SSO session
      # cookie needs to be visible across every *.nstnr.com subdomain it
      # protects, not just Authentik's own hostname.
      cookie_domain: nstnr.com
      postgresql:
        host: authentik-postgres-rw
        name: authentik
        user: authentik
      # FILL IN: host/port/username/from below (not sensitive, plain values).
      # Password comes from the authentik-secrets Secret via valuesFrom.
      email:
        host: mail.infomaniak.com
        port: 587
        username: steiner.noe@ik.me
        from: "steiner.noe@ik.me"
        use_tls: true
        use_ssl: false
    server:
      replicas: 1
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      route:
        main:
          enabled: true
          parentRefs:
            - name: main
              namespace: envoy-gateway-system
              sectionName: https
          hostnames:
            - auth.nstnr.com
      # fsGroup 1000 matches the container's runtime UID/GID — without it the
      # non-root authentik process can't write to the mounted PVC.
      securityContext:
        fsGroup: 1000
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /data
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      securityContext:
        fsGroup: 1000
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: authentik-media
      volumeMounts:
        - name: media
          mountPath: /data
  valuesFrom:
    - kind: Secret
      name: authentik-secrets
      valuesKey: secret-key
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secrets
      valuesKey: bootstrap-password
      targetPath: authentik.bootstrap_password
    - kind: Secret
      name: authentik-secrets
      valuesKey: bootstrap-token
      targetPath: authentik.bootstrap_token
    - kind: Secret
      name: authentik-postgres-app
      valuesKey: password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secrets
      valuesKey: smtp-password
      targetPath: authentik.email.password
